name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri
        run: npx tauri build --target ${{ matrix.target }}

      - name: Collect artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifacts
          cp src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb artifacts/ || true
          cp src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage artifacts/ || true

      - name: Collect artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          cp src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg artifacts/ || true

      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p artifacts
          cp src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi artifacts/ || true
          cp src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe artifacts/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kivo-${{ matrix.target }}
          path: artifacts/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: false

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find all-artifacts -type f \( -name "*.deb" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.msi" -o -name "*.exe" \) -exec cp {} release/ \;
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Kivo ${{ github.ref_name }}
          body: |
            **Kivo ${{ github.ref_name }}** — Desktop translation app.

            | Platform | File |
            |----------|------|
            | Windows | `.msi` or `.exe` |
            | macOS (Apple Silicon) | `_aarch64.dmg` |
            | macOS (Intel) | `_x64.dmg` |
            | Linux | `.deb` or `.AppImage` |
          files: release/*
          draft: false
          prerelease: false
